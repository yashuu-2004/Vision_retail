version: "3.9"

# ============================================================================
# VisionRetail AI - Multi-Service Docker Compose
# ============================================================================
# Run with:   docker compose up --build
# Reviewer can do:  git clone ... && cd vision-retail-ai && docker compose up --build
# Then visit:       http://localhost:8000 (API + docs)
#                   http://localhost:8501 (Streamlit dashboard)
#
# All services share the same image — the entrypoint changes per service.
# Adding a new store: drop a metadata.json + cameras/ + pos.csv under data/
# and re-run `docker compose up --build`.  No code changes required.
# ============================================================================

x-common-env: &common-env
  PYTHONUNBUFFERED: "1"
  LOG_LEVEL: INFO
  DATA_DIR: /app/data
  STORE_DATASET: brigade_road
  TZ: Asia/Calcutta

services:
  # --------------------------------------------------------------------------
  # API (FastAPI) — the central surface for events, analytics, and metadata
  # --------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: vision-retail-ai:latest
    container_name: vision_retail_api
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      <<: *common-env
      # Default to SQLite inside the container; override with DATABASE_URL
      # when running with the `postgres` service below.
      DATABASE_URL: sqlite:///./vision_retail.db
      API_URL: http://api:8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./datasets:/app/datasets
      - ./artifacts:/app/artifacts
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Dashboard (Streamlit)
  # --------------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: vision-retail-ai:latest
    container_name: vision_retail_dashboard
    command: >
      streamlit run src/dashboard/main.py
      --server.address 0.0.0.0
      --server.port 8501
      --server.headless true
    environment:
      <<: *common-env
      API_URL: http://api:8000
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data:ro
      - ./datasets:/app/datasets
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8501/_stcore/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Postgres (optional — defaults to SQLite).  Uncomment the `depends_on` and
  # volume lines below in the `api` service when using the postgres backend.
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: vision_retail_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vision_retail
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Detection worker — runs the metadata-driven pipeline against the cameras
  # in data/<store>/cameras/ and writes canonical events to datasets/events/
  # --------------------------------------------------------------------------
  detection:
    build:
      context: .
      dockerfile: docker/Dockerfile.detection
    image: vision-retail-ai:detection
    container_name: vision_retail_detection
    environment:
      <<: *common-env
      PIPELINE_OUTPUT: /app/datasets/events
    volumes:
      - ./data:/app/data:ro
      - ./datasets:/app/datasets
    profiles: ["detection"]

volumes:
  postgres_data:
    driver: local
