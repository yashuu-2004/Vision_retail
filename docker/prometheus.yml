global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'vision-retail'
    environment: 'production'

scrape_configs:
  - job_name: 'vision-retail-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - '/etc/prometheus/rules/*.yml'
